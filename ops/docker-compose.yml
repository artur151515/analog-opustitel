version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: profithunter-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: profithunter
      POSTGRES_USER: profithunter
      POSTGRES_PASSWORD: ${DB_PASSWORD:-PH_securepass_2025}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U profithunter"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ph-network

  redis:
    image: redis:7-alpine
    container_name: profithunter-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ph-network

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: profithunter-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://profithunter:${DB_PASSWORD:-PH_securepass_2025}@postgres:5432/profithunter
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=${SECRET_KEY:-change-this-to-random-string}
      - DEBUG=true
      - LOG_LEVEL=INFO
      - APP_VERSION=1.0.0
      - CORS_ORIGINS_RAW=https://proffithunter.com,http://proffithunter.com,http://localhost:3000
      - BOT_TOKEN=${BOT_TOKEN:-}
      - CHAT_ID=${CHAT_ID:-}
      - SMTP_SERVER=${SMTP_SERVER:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM_EMAIL=noreply@proffithunter.com
      - SMTP_FROM_NAME=ProfitHunter
      - SMTP_USE_TLS=true
      - POCKET_OPTION_PARTNER_ID=${POCKET_OPTION_PARTNER_ID:-}
      - POCKET_OPTION_API_TOKEN=${POCKET_OPTION_API_TOKEN:-bTq2J8XiVdYJsWddHCEm}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ph-network

  web:
    build:
      context: ../web
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://proffithunter.com
    container_name: profithunter-web
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=https://proffithunter.com
      - NEXT_PUBLIC_APP_NAME=ProfitHunter
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - ph-network

volumes:
  postgres_data:
  redis_data:

networks:
  ph-network:
    driver: bridge
